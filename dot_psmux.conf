# psmux configuration - byobu-compatible keybindings
# See: https://github.com/psmux/psmux

# === Prefix key (byobu default: F12) ===
set -g prefix F12
unbind-key C-b
unbind-key C-a

# === Basic settings ===
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -g history-limit 10000
# NOTE: default-shell だけでは new-window/split-window でシェルが起動しない
# psmux のバグの可能性があるため、各 bind-key で pwsh.exe を明示指定している
set -g default-shell pwsh.exe
set -g mode-keys vi
set -g escape-time 100
set -g allow-predictions on
set -g warm off

# === Byobu F-key bindings (root table, no prefix needed) ===
bind-key -n F2 new-window "pwsh.exe -NoLogo"                               # F2: 新しいウィンドウ
bind-key -n F3 previous-window                                             # F3: 前のウィンドウ
bind-key -n F4 next-window                                                 # F4: 次のウィンドウ
bind-key -n F6 detach-client                                               # F6: デタッチ
bind-key -n F7 copy-mode                                                   # F7: コピーモード
bind-key -n F8 command-prompt -p "Rename window:" "rename-window '%%'"     # F8: ウィンドウ名変更

# === Split panes ===
bind-key -n S-F2 split-window -v "pwsh.exe -NoLogo"                        # Shift+F2: 横分割
bind-key -n C-F2 split-window -h "pwsh.exe -NoLogo"                        # Ctrl+F2: 縦分割

# === Navigate panes ===
bind-key -n S-F3 select-pane -t :.-                                        # Shift+F3: 前のペイン
bind-key -n S-F4 select-pane -t :.+                                        # Shift+F4: 次のペイン

# === Swap panes ===
bind-key -n C-F3 display-panes \; swap-pane -s :. -t :.- \; select-pane -t :.   # Ctrl+F3: ペインを前に入れ替え
bind-key -n C-F4 display-panes \; swap-pane -s :. -t :.+ \; select-pane -t :.   # Ctrl+F4: ペインを後に入れ替え

# === Arrow key bindings (byobu style) ===

# Shift+Arrow: ペイン切り替え (方向指定)
bind-key -n S-Left select-pane -L
bind-key -n S-Right select-pane -R
bind-key -n S-Up select-pane -U
bind-key -n S-Down select-pane -D

# Alt+Arrow: ウィンドウ切り替え (左右) / セッション切り替え (上下)
bind-key -n M-Left previous-window
bind-key -n M-Right next-window
bind-key -n M-Up switch-client -p
bind-key -n M-Down switch-client -n

# Ctrl+Arrow: ペインリサイズ
bind-key -n C-Up resize-pane -U
bind-key -n C-Down resize-pane -D
bind-key -n C-Left resize-pane -L
bind-key -n C-Right resize-pane -R

# === Break pane ===
bind-key -n M-C-F11 break-pane                                             # Alt+Ctrl+F11: ペインをウィンドウに分離

# === Vi copy mode keybindings ===
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel

# === Clipboard ===
set -g set-clipboard on
