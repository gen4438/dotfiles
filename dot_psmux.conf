# psmux configuration - byobu-compatible keybindings
# Reference: /usr/share/byobu/keybindings/f-keys.tmux
# See: https://github.com/psmux/psmux
#
# NOTE: psmux 3.3.2 では \; によるコマンドチェインが動作しない (Issue #192)
# 修正済みだが未リリース。リリース後は byobu 同様 display-panes \; を追加可能

# === Prefix key (byobu default: F12) ===
set -g prefix F12
unbind-key C-b
unbind-key C-a

# === Basic settings ===
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -g history-limit 10000
# NOTE: default-shell だけでは new-window/split-window でシェルが起動しない
# psmux のバグの可能性があるため、各 bind-key で pwsh.exe を明示指定している
set -g default-shell pwsh.exe
set -g mode-keys vi
set -g escape-time 100
set -g allow-predictions on
set -g warm off

# === Status bar: アクティブウィンドウをハイライト ===
set -g window-status-current-style "bg=colour33,fg=colour231,bold"
set -g window-status-style "fg=colour250"
set -g status-style "bg=colour236,fg=colour250"

# =============================================================================
# Byobu F-key bindings (root table, no prefix needed)
# =============================================================================

# --- F2: 新しいウィンドウ / 分割 / セッション ---
bind-key -n F2 new-window "pwsh.exe -NoLogo"
bind-key -n S-F2 split-window -v "pwsh.exe -NoLogo"
bind-key -n C-F2 split-window -h "pwsh.exe -NoLogo"
bind-key -n C-S-F2 new-session

# --- F3/F4: ウィンドウ切り替え ---
bind-key -n F3 previous-window
bind-key -n F4 next-window

# --- Shift+F3/F4: ペイン切り替え (順番) ---
bind-key -n S-F3 select-pane -t :.-
bind-key -n S-F4 select-pane -t :.+

# --- Ctrl+F3/F4: ペイン入れ替え ---
bind-key -n C-F3 swap-pane -s :. -t :.-
bind-key -n C-F4 swap-pane -s :. -t :.+

# --- Ctrl+Shift+F3/F4: ウィンドウ移動 ---
bind-key -n C-S-F3 swap-window -t :-1 -d
bind-key -n C-S-F4 swap-window -t :+1 -d

# --- F6: デタッチ / ペイン削除 ---
bind-key -n F6 detach
bind-key -n C-F6 kill-pane

# --- F7: コピーモード ---
bind-key -n F7 copy-mode
bind-key -n M-NPage copy-mode
bind-key -n M-PPage copy-mode

# --- F8: リネーム ---
bind-key -n F8 command-prompt -p "(rename-window) " "rename-window '%%'"
bind-key -n C-F8 command-prompt -p "(rename-session) " "rename-session '%%'"

# --- S-F8: レイアウト切り替え ---
bind-key -n S-F8 next-layout

# --- F11: ペイン操作 ---
bind-key -n M-F11 break-pane
bind-key -n C-F11 join-pane -h -s :. -t :-1
bind-key -n S-F11 resize-pane -Z

# =============================================================================
# Arrow key bindings (byobu style)
# =============================================================================

# Shift+Arrow: ペイン切り替え (方向指定)
bind-key -n S-Left select-pane -L
bind-key -n S-Right select-pane -R
bind-key -n S-Up select-pane -U
bind-key -n S-Down select-pane -D

# Alt+Arrow: ウィンドウ切り替え (左右) / セッション切り替え (上下)
bind-key -n M-Left previous-window
bind-key -n M-Right next-window
bind-key -n M-Up switch-client -p
bind-key -n M-Down switch-client -n

# Alt+Shift+Arrow: ペインリサイズ
bind-key -n M-S-Up resize-pane -U
bind-key -n M-S-Down resize-pane -D
bind-key -n M-S-Left resize-pane -L
bind-key -n M-S-Right resize-pane -R

# =============================================================================
# Copy mode (Vi keybindings)
# =============================================================================
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel

# Alt+Insert: ペースト
bind-key -n M-IC paste-buffer

# === Clipboard ===
set -g set-clipboard on
